openapi: 3.0.3
info:
  title: SmartTicket API
  description: |
    B2B multi-tenant ticketing and knowledge collaboration platform API.

    This API provides comprehensive functionality for:
    - Multi-tenant management with role-based access control
    - User management and authentication
    - Ticket lifecycle management with SLA tracking
    - Knowledge base and document management

    ## Authentication
    All API requests (except authentication endpoints) require a valid JWT token in the `Authorization` header:
    ```
    Authorization: Bearer <jwt_token>
    ```

    ## Multi-Tenancy
    All requests must include tenant context via headers:
    - `X-Tenant-ID`: The tenant identifier
    - `X-User-ID`: The requesting user identifier

    ## Error Handling
    The API uses standard HTTP status codes and returns consistent error responses.

  version: 1.0.0
  contact:
    name: SmartTicket API Support
    email: api-support@smartticket.com
  license:
    name: Commercial License
    url: https://smartticket.com/license

servers:
  - url: https://api.smartticket.com/v1
    description: Production server
  - url: https://staging-api.smartticket.com/v1
    description: Staging server
  - url: http://localhost:3001/v1
    description: Development server

security:
  - BearerAuth: []
  - TenantAuth: []

paths:
  # Authentication endpoints
  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user and return JWT tokens
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              admin_login:
                summary: Admin user login
                value:
                  email: "admin@test.smartticket.com"
                  password: "securePassword123"
                  tenant_domain: "test.smartticket.com"
                  remember_me: false
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Get new access token using refresh token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Tenant Management endpoints
  /tenants:
    get:
      tags:
        - Tenant Management
      summary: List tenants
      description: Retrieve a paginated list of tenants with filtering
      operationId: listTenants
      security:
        - BearerAuth: []
          TenantAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: Tenants retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTenantsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Tenant Management
      summary: Create new tenant
      description: Create a new tenant with initial configuration
      operationId: createTenant
      security:
        - BearerAuth: []
          TenantAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
      responses:
        '201':
          description: Tenant created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTenantResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tenants/{tenant_id}:
    get:
      tags:
        - Tenant Management
      summary: Get tenant by ID
      description: Retrieve detailed information about a specific tenant
      operationId: getTenant
      security:
        - BearerAuth: []
          TenantAuth: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          description: Tenant UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tenant retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTenantResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # User Management endpoints
  /users:
    get:
      tags:
        - User Management
      summary: List users
      description: Retrieve a paginated list of users with filtering
      operationId: listUsers
      security:
        - BearerAuth: []
          TenantAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUsersResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - User Management
      summary: Create new user
      description: Create a new user in the tenant
      operationId: createUser
      security:
        - BearerAuth: []
          TenantAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{user_id}:
    get:
      tags:
        - User Management
      summary: Get user by ID
      description: Retrieve detailed information about a specific user
      operationId: getUser
      security:
        - BearerAuth: []
          TenantAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          description: User UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token

    TenantAuth:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: Tenant identifier

  parameters:
    Page:
      name: page
      in: query
      description: Page number (1-based)
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSize:
      name: page_size
      in: query
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    Search:
      name: search
      in: query
      description: Search query
      schema:
        type: string
        minLength: 1
        maxLength: 100

  schemas:
    # Common schemas
    Response:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          additionalProperties: true
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Error'
        request_id:
          type: string
          format: uuid

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error code (e.g., VALIDATION_ERROR, NOT_FOUND)
        message:
          type: string
          description: Human-readable error message
        details:
          type: object
          additionalProperties: true
          description: Additional error details

    # Pagination schemas
    PaginationRequest:
      type: object
      properties:
        page_size:
          type: integer
          format: int32
          description: Number of items per page
        page_token:
          type: string
          description: Token for pagination

    PaginationResponse:
      type: object
      properties:
        total_count:
          type: integer
          format: int32
          description: Total number of items
        page_size:
          type: integer
          format: int32
          description: Number of items per page
        next_page_token:
          type: string
          description: Token for next page
        prev_page_token:
          type: string
          description: Token for previous page

    # Authentication schemas
    LoginRequest:
      type: object
      required:
        - email
        - password
        - tenant_domain
      properties:
        email:
          type: string
          format: email
          description: User email address
        password:
          type: string
          format: password
          description: User password
        tenant_domain:
          type: string
          description: Tenant domain
        remember_me:
          type: boolean
          description: Whether to extend session
          default: false

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        access_token:
          type: string
          description: JWT access token
        refresh_token:
          type: string
          description: JWT refresh token
        expires_at:
          type: string
          format: date-time
          description: Token expiration time
        user:
          $ref: '#/components/schemas/User'

    RefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: JWT refresh token

    RefreshTokenResponse:
      type: object
      properties:
        success:
          type: boolean
        access_token:
          type: string
          description: New JWT access token
        refresh_token:
          type: string
          description: New JWT refresh token
        expires_at:
          type: string
          format: date-time
          description: Token expiration time

    # User schemas
    User:
      type: object
      required:
        - id
        - email
        - username
        - full_name
        - role
        - is_active
      properties:
        id:
          type: string
          format: uuid
          description: User UUID
        tenant_id:
          type: string
          format: uuid
          description: Tenant UUID
        email:
          type: string
          format: email
          description: User email
        username:
          type: string
          description: Unique username
        full_name:
          type: string
          description: User's full name
        role:
          $ref: '#/components/schemas/UserRole'
        is_active:
          type: boolean
          description: Whether user is active
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp

    UserRole:
      type: string
      enum:
        - USER_ROLE_UNSPECIFIED
        - USER_ROLE_SUPER_ADMIN
        - USER_ROLE_TENANT_ADMIN
        - USER_ROLE_SUPPORT_ENGINEER
        - USER_ROLE_CUSTOMER_USER
        - USER_ROLE_SALES
      description: User role levels

    CreateUserRequest:
      type: object
      required:
        - email
        - username
        - full_name
        - password
        - role
      properties:
        email:
          type: string
          format: email
          description: User email
        username:
          type: string
          description: Unique username
        full_name:
          type: string
          description: User's full name
        password:
          type: string
          format: password
          description: User password
        role:
          $ref: '#/components/schemas/UserRole'
        metadata:
          $ref: '#/components/schemas/RequestMetadata'

    GetUserRequest:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
          format: uuid
          description: User UUID
        metadata:
          $ref: '#/components/schemas/RequestMetadata'

    ListUsersRequest:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/PaginationRequest'
        search:
          type: string
          description: Search query
        metadata:
          $ref: '#/components/schemas/RequestMetadata'

    CreateUserResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        user:
          $ref: '#/components/schemas/User'

    GetUserResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        user:
          $ref: '#/components/schemas/User'

    ListUsersResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
        pagination:
          $ref: '#/components/schemas/PaginationResponse'

    # Tenant schemas
    Tenant:
      type: object
      required:
        - id
        - name
        - domain
        - subscription_tier
        - max_users
        - data_residency_region
        - is_active
      properties:
        id:
          type: string
          format: uuid
          description: Tenant UUID
        name:
          type: string
          description: Tenant name
        domain:
          type: string
          description: Tenant domain
        subscription_tier:
          $ref: '#/components/schemas/SubscriptionTier'
        max_users:
          type: integer
          format: int32
          description: Maximum number of users
        data_residency_region:
          type: string
          description: Data residency region
        is_active:
          type: boolean
          description: Whether tenant is active
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp

    SubscriptionTier:
      type: string
      enum:
        - SUBSCRIPTION_TIER_UNSPECIFIED
        - SUBSCRIPTION_TIER_STANDARD
        - SUBSCRIPTION_TIER_PREMIUM
        - SUBSCRIPTION_TIER_ENTERPRISE
      description: Subscription tier levels

    CreateTenantRequest:
      type: object
      required:
        - name
        - domain
        - subscription_tier
        - max_users
        - data_residency_region
        - contact_email
      properties:
        name:
          type: string
          description: Tenant name
        domain:
          type: string
          description: Tenant domain
        subscription_tier:
          $ref: '#/components/schemas/SubscriptionTier'
        max_users:
          type: integer
          format: int32
          description: Maximum users allowed
        data_residency_region:
          type: string
          description: Data residency region
        contact_email:
          type: string
          format: email
          description: Contact email
        metadata:
          $ref: '#/components/schemas/RequestMetadata'

    GetTenantRequest:
      type: object
      required:
        - tenant_id
      properties:
        tenant_id:
          type: string
          format: uuid
          description: Tenant UUID
        metadata:
          $ref: '#/components/schemas/RequestMetadata'

    ListTenantsRequest:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/PaginationRequest'
        search:
          type: string
          description: Search query
        metadata:
          $ref: '#/components/schemas/RequestMetadata'

    CreateTenantResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        tenant:
          $ref: '#/components/schemas/Tenant'

    GetTenantResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        tenant:
          $ref: '#/components/schemas/Tenant'

    ListTenantsResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        tenants:
          type: array
          items:
            $ref: '#/components/schemas/Tenant'
        pagination:
          $ref: '#/components/schemas/PaginationResponse'

    # Metadata
    RequestMetadata:
      type: object
      properties:
        tenant_id:
          type: string
          description: Tenant identifier
        user_id:
          type: string
          description: User identifier
        request_id:
          type: string
          description: Request identifier
        client_ip_address:
          type: string
          description: Client IP address
        user_agent:
          type: string
          description: User agent string

  responses:
    BadRequest:
      description: Bad request - invalid input parameters
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Response'
              - type: object
                example:
                  success: false
                  message: "Invalid input parameters"
                  errors:
                    - code: "VALIDATION_ERROR"
                      message: "Email is required"
                  request_id: "req_123456789"

    Unauthorized:
      description: Unauthorized - invalid or missing authentication
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Response'
              - type: object
                example:
                  success: false
                  message: "Authentication required"
                  errors:
                    - code: "UNAUTHORIZED"
                      message: "Invalid or missing JWT token"
                  request_id: "req_123456789"

    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Response'
              - type: object
                example:
                  success: false
                  message: "Insufficient permissions"
                  errors:
                    - code: "FORBIDDEN"
                      message: "User does not have required permissions"
                  request_id: "req_123456789"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Response'
              - type: object
                example:
                  success: false
                  message: "Resource not found"
                  errors:
                    - code: "NOT_FOUND"
                      message: "Requested resource does not exist"
                  request_id: "req_123456789"

    Conflict:
      description: Resource already exists or conflict with existing resource
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Response'
              - type: object
                example:
                  success: false
                  message: "Resource already exists"
                  errors:
                    - code: "CONFLICT"
                      message: "Tenant with this domain already exists"
                  request_id: "req_123456789"

tags:
  - name: Authentication
    description: Authentication and token management endpoints
  - name: Tenant Management
    description: Multi-tenant administration and management
  - name: User Management
    description: User profile and account management