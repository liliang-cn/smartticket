                $ref: '#/components/schemas/UpdateTenantStatusResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /tenants/{tenant_id}/subscription:
    put:
      tags:
        - Tenant Management
      summary: Update subscription
      description: Update tenant subscription tier and limits
      operationId: updateSubscription
      security:
        - BearerAuth: []
          TenantAuth: []
      parameters:
        - name: tenant_id
          in: path
