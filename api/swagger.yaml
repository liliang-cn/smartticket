        - name: visibilities
          in: query
          description: Filter by visibility levels
          schema:
            type: array
            items:
              $ref: '#/components/schemas/KnowledgeVisibility'
        - name: category_id
          in: query
          description: Filter by category
          schema:
            type: string
            format: uuid
        - name: author_id
          in: query
          description: Filter by author
          schema:
            type: string
            format: uuid
        - name: language
          in: query
          description: Filter by language
          schema:
            type: string
        - name: tags
