  /tickets/search:
    post:
      tags:
        - Ticket Management
      summary: Search tickets
      description: Search tickets using full-text search with filters
      operationId: searchTickets
      security:
        - BearerAuth: []
          TenantAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchTicketsRequest'
      responses:
        '200':
          description: Tickets searched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchTicketsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /tickets/{ticket_id}:
    get:
      tags:
        - Ticket Management
      summary: Get ticket by ID
      description: Retrieve detailed information about a specific ticket
      operationId: getTicket
      security:
        - BearerAuth: []
          TenantAuth: []
      parameters:
        - name: ticket_id
          in: path
          required: true
          description: Ticket UUID
          schema:
            type: string
            format: uuid
        - name: include_comments
          in: query
          description: Include ticket comments in response
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Ticket retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTicketResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Ticket Management
      summary: Update ticket
      description: Update ticket information and details
      operationId: updateTicket
      security:
        - BearerAuth: []
          TenantAuth: []
      parameters:
        - name: ticket_id
          in: path
          required: true
          description: Ticket UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTicketRequest'
      responses:
        '200':
          description: Ticket updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateTicketResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Ticket Management
      summary: Delete ticket
      description: Soft delete a ticket (marks as deleted)
      operationId: deleteTicket
      security:
        - BearerAuth: []
          TenantAuth: []
      parameters:
        - name: ticket_id
          in: path
          required: true
          description: Ticket UUID
          schema:
            type: string
            format: uuid
      responses:
        '204':
