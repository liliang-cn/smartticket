  /knowledge/articles/search:
    post:
      tags:
        - Knowledge Management
      summary: Search knowledge articles
      description: Search knowledge articles using full-text search
      operationId: searchArticles
      security:
        - BearerAuth: []
          TenantAuth: []
      requestBody:
