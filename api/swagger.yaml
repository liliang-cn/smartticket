        - name: period_start
          in: query
          description: Start of usage period (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: period_end
          in: query
          description: End of usage period (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: include_detailed_metrics
          in: query
          description: Include detailed usage metrics
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Usage statistics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTenantUsageResponse'
        '404':
