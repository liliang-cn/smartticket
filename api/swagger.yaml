        - name: assigned_to_id
          in: query
          description: Filter by assigned user
          schema:
            type: string
            format: uuid
        - name: contact_id
          in: query
          description: Filter by contact user
          schema:
            type: string
            format: uuid
        - name: category_id
          in: query
          description: Filter by category
          schema:
            type: string
            format: uuid
        - name: created_after
          in: query
          description: Filter tickets created after this date
          schema:
            type: string
            format: date-time
        - name: created_before
          in: query
          description: Filter tickets created before this date
          schema:
            type: string
            format: date-time
        - name: due_after
          in: query
          description: Filter tickets due after this date
          schema:
            type: string
            format: date-time
        - name: due_before
          in: query
          description: Filter tickets due before this date
          schema:
            type: string
            format: date-time
