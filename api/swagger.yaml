components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token

    TenantAuth:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: Tenant identifier

  parameters:
    Page:
      name: page
      in: query
      description: Page number (1-based)
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSize:
      name: page_size
      in: query
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    Search:
      name: search
      in: query
      description: Search query
      schema:
        type: string
        minLength: 1
        maxLength: 100

  schemas:
    # Common schemas
    Response:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          additionalProperties: true
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Error'
        request_id:
          type: string
          format: uuid

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error code (e.g., VALIDATION_ERROR, NOT_FOUND)
        message:
          type: string
          description: Human-readable error message
        details:
          type: object
          additionalProperties: true
          description: Additional error details

    PaginationResponse:
      type: object
      properties:
        total_count:
          type: integer
          description: Total number of items
        page_size:
          type: integer
          description: Number of items per page
        next_page_token:
          type: string
          description: Token for next page
        prev_page_token:
          type: string
          description: Token for previous page

    # Authentication schemas
    LoginRequest:
      type: object
      required:
        - email
        - password
        - tenant_domain
      properties:
        email:
          type: string
          format: email
          description: User email address
        password:
          type: string
          format: password
          description: User password
        tenant_domain:
          type: string
          description: Tenant domain
        remember_me:
          type: boolean
          description: Whether to extend session
          default: false

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        access_token:
          type: string
          description: JWT access token
        refresh_token:
          type: string
          description: JWT refresh token
        expires_at:
          type: string
          format: date-time
          description: Token expiration time
        user:
          $ref: '#/components/schemas/User'

    RefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: JWT refresh token

    RefreshTokenResponse:
      type: object
      properties:
        success:
          type: boolean
        access_token:
          type: string
          description: New JWT access token
        refresh_token:
          type: string
          description: New JWT refresh token
        expires_at:
          type: string
          format: date-time
          description: Token expiration time

    # Tenant schemas
    TenantInfo:
      type: object
      required:
        - id
        - name
        - domain
        - subscription_tier
        - max_users
        - data_residency_region
        - is_active
      properties:
        id:
          type: string
          format: uuid
          description: Tenant UUID
        name:
          type: string
          description: Tenant name
        domain:
          type: string
          description: Tenant domain
        subscription_tier:
          $ref: '#/components/schemas/SubscriptionTier'
        max_users:
          type: integer
          description: Maximum number of users
        data_residency_region:
          type: string
          description: Data residency region
        is_active:
          type: boolean
          description: Whether tenant is active
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        current_user_count:
          type: integer
          description: Current number of users
        subscription_expires_at:
          type: string
          format: date-time
          description: Subscription expiration
        is_trial:
          type: boolean
          description: Whether this is a trial tenant
        contact_email:
          type: string
          format: email
          description: Contact email
        billing_address:
          type: string
          description: Billing address
        phone:
          type: string
          description: Phone number
        settings:
          $ref: '#/components/schemas/TenantSettings'

    TenantSettings:
      type: object
      properties:
        default_timezone:
          type: string
          description: Default timezone
        default_language:
          type: string
          description: Default language
        enable_multi_language:
          type: boolean
          description: Enable multi-language support
        allow_user_registration:
          type: boolean
          description: Allow user self-registration
        branding_logo_url:
          type: string
          format: uri
          description: Branding logo URL
        branding_color:
          type: string
          description: Branding color (hex)
        custom_fields:
          type: object
          additionalProperties: true
          description: Custom configuration fields
        security:
          $ref: '#/components/schemas/SecuritySettings'
        notifications:
          $ref: '#/components/schemas/NotificationSettings'

    SecuritySettings:
      type: object
      properties:
        require_2fa:
          type: boolean
          description: Require two-factor authentication
        password_min_length:
          type: integer
          description: Minimum password length
        require_password_change:
          type: boolean
          description: Require password change on first login
        session_timeout_minutes:
          type: integer
          description: Session timeout in minutes
        ip_whitelist_enabled:
          type: boolean
          description: Enable IP whitelist
        allowed_ip_ranges:
          type: array
          items:
            type: string
          description: Allowed IP ranges (CIDR notation)

    NotificationSettings:
      type: object
      properties:
        email_notifications:
          type: boolean
          description: Enable email notifications
        sms_notifications:
          type: boolean
          description: Enable SMS notifications
        push_notifications:
          type: boolean
          description: Enable push notifications
        default_from_email:
          type: string
          format: email
          description: Default sender email
        default_from_name:
          type: string
          description: Default sender name
        notification_templates:
          type: object
          additionalProperties: true
          description: Custom notification templates

    SubscriptionTier:
      type: string
      enum:
        - STANDARD
        - PREMIUM
        - ENTERPRISE
      description: Subscription tier levels

    # Tenant request/response schemas
    CreateTenantRequest:
      type: object
      required:
        - name
        - domain
        - subscription_tier
        - max_users
        - data_residency_region
        - contact_email
      properties:
        name:
          type: string
          description: Tenant name
        domain:
          type: string
          description: Tenant domain
        subscription_tier:
          $ref: '#/components/schemas/SubscriptionTier'
        max_users:
          type: integer
          description: Maximum users allowed
        data_residency_region:
          type: string
          description: Data residency region
        contact_email:
          type: string
          format: email
          description: Contact email
        billing_address:
          type: string
          description: Billing address
        phone:
          type: string
          description: Phone number
        settings:
          $ref: '#/components/schemas/TenantSettings'
        payment_method:
          $ref: '#/components/schemas/PaymentMethod'
        is_trial:
          type: boolean
          description: Whether this is a trial tenant

    UpdateTenantRequest:
      type: object
      properties:
        name:
          type: string
          description: Tenant name
        domain:
          type: string
          description: Tenant domain
        contact_email:
          type: string
          format: email
          description: Contact email
        billing_address:
          type: string
          description: Billing address
        phone:
          type: string
          description: Phone number
        settings:
          $ref: '#/components/schemas/TenantSettings'

    UpdateTenantStatusRequest:
      type: object
      required:
        - is_active
      properties:
        is_active:
          type: boolean
          description: New active status
        reason:
          type: string
          description: Reason for status change

    UpdateSubscriptionRequest:
      type: object
      required:
        - new_tier
        - new_max_users
      properties:
        new_tier:
          $ref: '#/components/schemas/SubscriptionTier'
        new_max_users:
          type: integer
          description: New maximum user limit
        effective_date:
          type: string
          format: date-time
          description: When the change takes effect
        prorate:
          type: boolean
          description: Whether to prorate billing
        billing_change_reason:
          type: string
          description: Reason for billing change

    PaymentMethod:
      type: object
      properties:
        type:
          type: string
          enum: [credit_card, bank_transfer, invoice]
          description: Payment method type
        last_four:
          type: string
          description: Last four digits
        expires_at:
          type: string
          format: date-time
          description: Expiration date
        is_default:
          type: boolean
          description: Whether this is the default method
        provider:
          type: string
          description: Payment provider

    # Tenant response schemas
    CreateTenantResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        tenant:
          $ref: '#/components/schemas/TenantInfo'
        setup_token:
          type: string
          description: Token for initial admin setup

    GetTenantResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        tenant:
          $ref: '#/components/schemas/TenantInfo'

    GetCurrentTenantResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        tenant:
          $ref: '#/components/schemas/TenantInfo'
        recent_users:
          type: array
          items:
            $ref: '#/components/schemas/User'

    UpdateTenantResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        tenant:
          $ref: '#/components/schemas/TenantInfo'

    ListTenantsResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        tenants:
          type: array
          items:
            $ref: '#/components/schemas/TenantInfo'
        pagination:
          $ref: '#/components/schemas/PaginationResponse'

    UpdateTenantStatusResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        tenant:
          $ref: '#/components/schemas/TenantInfo'

    UpdateSubscriptionResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        tenant:
          $ref: '#/components/schemas/TenantInfo'
        billing:
          $ref: '#/components/schemas/TenantBilling'
        will_invoice:
          type: boolean
          description: Whether this change will generate an invoice

    # Usage and Billing schemas
    TenantUsage:
      type: object
      properties:
        tenant_id:
          type: string
          format: uuid
        total_users:
          type: integer
        active_users:
          type: integer
        total_tickets:
          type: integer
        open_tickets:
          type: integer
        storage_used_bytes:
          type: integer
        api_calls_this_month:
          type: integer
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time
        metrics:
          $ref: '#/components/schemas/UsageMetrics'

    UsageMetrics:
      type: object
      properties:
        tickets_created:
          type: integer
        tickets_resolved:
          type: integer
        avg_resolution_time_hours:
          type: integer
        knowledge_articles_created:
          type: integer
        knowledge_article_views:
          type: integer
        customer_satisfaction_score:
          type: integer
        top_users:
          type: array
          items:
            $ref: '#/components/schemas/UserActivitySummary'

    UserActivitySummary:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        user_name:
          type: string
        tickets_handled:
          type: integer
        tickets_resolved:
          type: integer
        avg_resolution_time_hours:
          type: integer

    TenantBilling:
      type: object
      properties:
        tenant_id:
          type: string
          format: uuid
        current_tier:
          $ref: '#/components/schemas/SubscriptionTier'
        billing_cycle_start:
          type: string
          format: date-time
        billing_cycle_end:
          type: string
          format: date-time
        currency:
          type: string
          description: Currency code (ISO 4217)
        monthly_cost:
          type: number
          format: double
        current_usage_cost:
          type: number
          format: double
        line_items:
          type: array
          items:
            $ref: '#/components/schemas/BillingLineItem'
        payment_method:
          $ref: '#/components/schemas/PaymentMethod'
        next_billing_date:
          type: string
          format: date-time

    BillingLineItem:
      type: object
      properties:
        item_type:
          type: string
          description: Type of billing item
        description:
          type: string
          description: Item description
        quantity:
          type: integer
          description: Quantity
        unit_price:
          type: number
          format: double
          description: Price per unit
        total_price:
          type: number
          format: double
          description: Total price

    GetTenantUsageResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        usage:
          $ref: '#/components/schemas/TenantUsage'

    GetTenantBillingResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        billing:
          $ref: '#/components/schemas/TenantBilling'
        upcoming_charges:
          type: array
          items:
            $ref: '#/components/schemas/BillingLineItem'

    # User schemas
    User:
      type: object
      required:
        - id
        - email
        - username
        - full_name
        - role
        - is_active
      properties:
        id:
          type: string
          format: uuid
          description: User UUID
        email:
          type: string
          format: email
          description: User email
        username:
          type: string
          description: Unique username
        full_name:
          type: string
          description: User's full name
        role:
          $ref: '#/components/schemas/UserRole'
        is_active:
          type: boolean
          description: Whether user is active
        last_login_at:
          type: string
          format: date-time
          description: Last login timestamp
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp

    UserProfile:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        username:
          type: string
        full_name:
          type: string
        phone:
          type: string
        timezone:
          type: string
        language:
          type: string
        preferences:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Permission:
      type: object
      properties:
        resource:
          type: string
          description: Resource identifier
        actions:
          type: array
          items:
            type: string
          description: Allowed actions on the resource

    UserRole:
      type: string
      enum:
        - SUPER_ADMIN
        - TENANT_ADMIN
        - SUPPORT_ENGINEER
        - CUSTOMER_USER
        - SALES
      description: User role levels

    # User request schemas
    CreateUserRequest:
      type: object
      required:
        - email
        - username
        - full_name
        - password
        - role
      properties:
        email:
          type: string
          format: email
          description: User email
        username:
          type: string
          description: Unique username
        full_name:
          type: string
          description: User's full name
        password:
          type: string
          format: password
          description: User password
        role:
          $ref: '#/components/schemas/UserRole'
        phone:
          type: string
          description: Phone number
        timezone:
          type: string
          description: User timezone
        language:
          type: string
          description: User language
        preferences:
          type: object
          additionalProperties: true
          description: User preferences

    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User email
        username:
          type: string
          description: Unique username
        full_name:
          type: string
          description: User's full name
        role:
          $ref: '#/components/schemas/UserRole'
        phone:
          type: string
          description: Phone number
        timezone:
          type: string
          description: User timezone
        language:
          type: string
          description: User language
        preferences:
          type: object
          additionalProperties: true
          description: User preferences

    UpdateCurrentUserRequest:
      type: object
      properties:
        full_name:
          type: string
          description: User's full name
        phone:
          type: string
          description: Phone number
        timezone:
          type: string
          description: User timezone
        language:
          type: string
          description: User language
        preferences:
          type: object
          additionalProperties: true
          description: User preferences

    UpdateUserStatusRequest:
      type: object
      required:
        - is_active
      properties:
        is_active:
          type: boolean
          description: New active status
        reason:
          type: string
          description: Reason for status change

    ChangePasswordRequest:
      type: object
      required:
        - current_password
        - new_password
      properties:
        current_password:
          type: string
          format: password
          description: Current password
        new_password:
          type: string
          format: password
          description: New password

    ResetPasswordRequest:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
          format: uuid
          description: User UUID
        temporary_password:
          type: string
          description: Temporary password (leave empty to auto-generate)
        send_email:
          type: boolean
          description: Whether to send email with temporary password

    # User response schemas
    CreateUserResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        user:
          $ref: '#/components/schemas/User'

    GetUserResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        user:
          $ref: '#/components/schemas/User'
        profile:
          $ref: '#/components/schemas/UserProfile'

    GetCurrentUserResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        user:
          $ref: '#/components/schemas/User'
        profile:
          $ref: '#/components/schemas/UserProfile'
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'

    UpdateUserResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        user:
          $ref: '#/components/schemas/User'

    UpdateCurrentUserResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        profile:
          $ref: '#/components/schemas/UserProfile'

    ListUsersResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
        pagination:
          $ref: '#/components/schemas/PaginationResponse'

    UpdateUserStatusResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        user:
          $ref: '#/components/schemas/User'

    ChangePasswordResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    ResetPasswordResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        temporary_password:
          type: string
          description: Generated temporary password

    GetUserPermissionsResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'

  responses:
    BadRequest:
      description: Bad request - invalid input parameters
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Response'
              - type: object
                example:
                  success: false
                  message: "Invalid input parameters"
                  errors:
                    - code: "VALIDATION_ERROR"
                      message: "Email is required"
                  request_id: "req_123456789"

    Unauthorized:
      description: Unauthorized - invalid or missing authentication
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Response'
              - type: object
                example:
                  success: false
                  message: "Authentication required"
                  errors:
                    - code: "UNAUTHORIZED"
                      message: "Invalid or missing JWT token"
                  request_id: "req_123456789"

    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Response'
              - type: object
                example:
                  success: false
                  message: "Insufficient permissions"
                  errors:
                    - code: "FORBIDDEN"
                      message: "User does not have required permissions"
                  request_id: "req_123456789"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Response'
              - type: object
                example:
                  success: false
                  message: "Resource not found"
                  errors:
                    - code: "NOT_FOUND"
                      message: "Requested resource does not exist"
                  request_id: "req_123456789"

    Conflict:
      description: Resource already exists or conflict with existing resource
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Response'
              - type: object
                example:
                  success: false
                  message: "Resource already exists"
                  errors:
                    - code: "CONFLICT"
                      message: "Tenant with this domain already exists"
                  request_id: "req_123456789"

    RateLimit:
      description: Too many requests - rate limit exceeded
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Response'
              - type: object
                example:
                  success: false
                  message: "Rate limit exceeded"
                  errors:
                    - code: "RATE_LIMIT_EXCEEDED"
                      message: "Too many requests, please try again later"
                  request_id: "req_123456789"

