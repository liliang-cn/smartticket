        - Tenant Management
      summary: Update tenant status
      description: Activate or deactivate a tenant
      operationId: updateTenantStatus
      security:
        - BearerAuth: []
          TenantAuth: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          description: Tenant UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTenantStatusRequest'
      responses:
        '200':
          description: Tenant status updated successfully
          content:
            application/json:
