openapi: 3.0.3
info:
  title: SmartTicket API
  description: |
    B2B multi-tenant ticketing and knowledge collaboration platform API.

    This API provides comprehensive functionality for:
    - Multi-tenant management with role-based access control
    - Ticket lifecycle management with SLA tracking
    - Knowledge base and document management
    - User management and authentication
    - Role and permission management

    ## Authentication
    All API requests (except authentication endpoints) require a valid JWT token in the `Authorization` header:
    ```
    Authorization: Bearer <jwt_token>
    ```

    ## Multi-Tenancy
    All requests must include tenant context via headers:
    - `X-Tenant-ID`: The tenant identifier
    - `X-User-ID`: The requesting user identifier
    - `X-User-Role`: The user's role in the tenant

    ## Rate Limiting
    API endpoints are rate-limited per tenant. Standard limits:
    - 1000 requests per hour for enterprise tier
    - 500 requests per hour for premium tier
    - 200 requests per hour for standard tier

    ## Error Handling
    The API uses standard HTTP status codes and returns consistent error responses:
    ```json
    {
      "success": false,
      "errors": [
        {
          "code": "VALIDATION_ERROR",
          "message": "Invalid input parameters",
          "details": {...}
        }
      ],
      "request_id": "req_123456789"
    }
    ```

  version: 1.0.0
  contact:
    name: SmartTicket API Support
    email: api-support@smartticket.com
  license:
    name: Commercial License
    url: https://smartticket.com/license

servers:
  - url: https://api.smartticket.com/v1
    description: Production server
  - url: https://staging-api.smartticket.com/v1
    description: Staging server
  - url: http://localhost:3001/v1
    description: Development server

security:
  - BearerAuth: []
  - TenantAuth: []

paths:
  # Authentication endpoints
  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user and return JWT tokens
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              admin_login:
                summary: Admin user login
                value:
                  email: "admin@test.smartticket.com"
                  password: "securePassword123"
                  tenant_domain: "test.smartticket.com"
                  remember_me: false
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimit'

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Get new access token using refresh token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Tenant Management endpoints
  /tenants:
    get:
      tags:
        - Tenant Management
      summary: List tenants
      description: Retrieve a paginated list of tenants with filtering
      operationId: listTenants
      security:
        - BearerAuth: []
          TenantAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - name: subscription_tier
          in: query
          description: Filter by subscription tier
          schema:
            $ref: '#/components/schemas/SubscriptionTier'
        - name: is_active
          in: query
          description: Filter by active status
          schema:
            type: boolean
        - name: data_residency_region
          in: query
          description: Filter by data residency region
          schema:
            type: string
      responses:
        '200':
          description: Tenants retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTenantsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags:
        - Tenant Management
      summary: Create new tenant
      description: Create a new tenant with initial configuration
      operationId: createTenant
      security:
        - BearerAuth: []
          TenantAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
      responses:
        '201':
          description: Tenant created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTenantResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /tenants/{tenant_id}:
    get:
      tags:
        - Tenant Management
      summary: Get tenant by ID
      description: Retrieve detailed information about a specific tenant
      operationId: getTenant
      security:
        - BearerAuth: []
          TenantAuth: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          description: Tenant UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tenant retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTenantResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags:
        - Tenant Management
      summary: Update tenant
      description: Update tenant information and settings
      operationId: updateTenant
      security:
        - BearerAuth: []
          TenantAuth: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          description: Tenant UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTenantRequest'
      responses:
        '200':
          description: Tenant updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateTenantResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Tenant Management
      summary: Delete tenant
      description: Soft delete a tenant (marks as inactive)
      operationId: deleteTenant
      security:
        - BearerAuth: []
          TenantAuth: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          description: Tenant UUID
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Tenant deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /tenants/current:
