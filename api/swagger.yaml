      description: Create a new knowledge article
      operationId: createArticle
      security:
        - BearerAuth: []
          TenantAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateArticleRequest'
      responses:
        '201':
          description: Article created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateArticleResponse'
