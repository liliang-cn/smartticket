        '404':
          $ref: '#/components/responses/NotFound'

  /tenants/{tenant_id}/usage:
    get:
      tags:
        - Tenant Management
      summary: Get tenant usage statistics
      description: Retrieve usage metrics and statistics for a tenant
      operationId: getTenantUsage
