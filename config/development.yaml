environment: "development"
service_name: "smartticket"
version: "0.1.0"

database:
  host: "localhost"
  port: 5434
  database_name: "smartticket"
  username: "postgres"
  password: "postgres"
  ssl_mode: "prefer"
  max_connections: 20
  min_connections: 5
  connect_timeout: 30
  idle_timeout: 600

redis:
  host: "localhost"
  port: 6380
  username: null
  password: null
  database: 0
  max_connections: 10
  connection_timeout: 5
  command_timeout: 5

server:
  grpc_port: 6533
  http_port: 7218
  host: "0.0.0.0"
  max_request_size: 10485760  # 10MB
  request_timeout: 30
  keep_alive: 60

auth:
  jwt_secret: "development-jwt-secret-change-in-production"
  jwt_expiration: 3600  # 1 hour
  refresh_expiration: 604800  # 7 days
  issuer: "smartticket"
  bcrypt_cost: 10
  password_min_length: 8
  password_require_special: true
  password_require_numbers: true
  password_require_uppercase: true
  rate_limit:
    enabled: true
    requests_per_minute: 60
    burst_size: 10

telemetry:
  tracing:
    enabled: true
    level: "debug"
    format: "pretty"
    output: "stdout"
  metrics:
    enabled: true
    port: 9090
    path: "/metrics"
  jaeger:
    endpoint: "localhost"
    port: 6831
    service_name: "smartticket"

log_level: "debug"
data_dir: "./data"