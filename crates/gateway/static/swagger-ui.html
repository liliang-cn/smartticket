<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTicket API Documentation</title>
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css" />
    <style>
        html {
            box-sizing: border-box;
            overflow: -moz-scrollbars-vertical;
            overflow-y: scroll;
        }
        *, *:before, *:after {
            box-sizing: inherit;
        }
        body {
            margin:0;
            background: #fafafa;
        }
        .swagger-ui .topbar {
            background-color: #2c3e50;
            border-bottom: 1px solid #34495e;
        }
        .swagger-ui .topbar .download-url-wrapper .select-label {
            color: #ecf0f1;
        }
    </style>
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-standalone-preset.js"></script>
    <script>
        window.onload = function() {
            // Build a system
            const ui = SwaggerUIBundle({
                url: './openapi.yaml',
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "StandaloneLayout",
                defaultModelsExpandDepth: 2,
                defaultModelExpandDepth: 2,
                tryItOutEnabled: true,
                displayRequestDuration: true,
                docExpansion: "none",
                filter: true,
                supportedSubmitMethods: ['get', 'post', 'put', 'delete', 'patch'],
                onComplete: function() {
                    console.log("SmartTicket API Documentation loaded successfully");
                },
                requestInterceptor: function(request) {
                    // Add authentication headers if needed
                    const token = localStorage.getItem('access_token');
                    if (token) {
                        request.headers.Authorization = 'Bearer ' + token;
                    }

                    const tenantId = localStorage.getItem('tenant_id');
                    if (tenantId) {
                        request.headers['X-Tenant-ID'] = tenantId;
                    }

                    const userId = localStorage.getItem('user_id');
                    if (userId) {
                        request.headers['X-User-ID'] = userId;
                    }

                    return request;
                },
                responseInterceptor: function(response) {
                    // Handle authentication responses
                    if (response.url && response.url.includes('/auth/login')) {
                        const data = response.body;
                        if (data.access_token) {
                            localStorage.setItem('access_token', data.access_token);
                        }
                        if (data.user && data.user.id) {
                            localStorage.setItem('user_id', data.user.id);
                            localStorage.setItem('tenant_id', data.user.tenant_id);
                        }
                    }
                    return response;
                }
            });
        };
    </script>
</body>
</html>
