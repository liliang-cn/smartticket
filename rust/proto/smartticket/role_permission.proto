syntax = "proto3";

package smartticket.v1;

import "google/protobuf/timestamp.proto";
import "smartticket/common.proto";
import "smartticket/ticket.proto";

option go_package = "github.com/smartticket/proto/smartticket/v1;smartticketv1";

// Role and Permission Management service definition
service RolePermissionService {
  // Role management
  rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse);
  rpc GetRole(GetRoleRequest) returns (GetRoleResponse);
  rpc UpdateRole(UpdateRoleRequest) returns (UpdateRoleResponse);
  rpc DeleteRole(DeleteRoleRequest) returns (DeleteRoleResponse);
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);

  // Permission management
  rpc ListPermissions(ListPermissionsRequest) returns (ListPermissionsResponse);
  rpc GetRolePermissions(GetRolePermissionsRequest) returns (GetRolePermissionsResponse);
  rpc AssignPermissionsToRole(AssignPermissionsToRoleRequest) returns (AssignPermissionsToRoleResponse);
  rpc RemovePermissionsFromRole(RemovePermissionsFromRoleRequest) returns (RemovePermissionsFromRoleResponse);

  // User role assignments
  rpc AssignRoleToUser(AssignRoleToUserRequest) returns (AssignRoleToUserResponse);
  rpc RemoveRoleFromUser(RemoveRoleFromUserRequest) returns (RemoveRoleFromUserResponse);
  rpc GetUserRoles(GetUserRolesRequest) returns (GetUserRolesResponse);
  rpc GetUsersWithRole(GetUsersWithRoleRequest) returns (GetUsersWithRoleResponse);
}

// Role definition
message Role {
  string id = 1;
  string name = 2;
  string description = 3;
  repeated RolePermission permissions = 4;
  bool is_system_role = 5;
  bool is_active = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  string created_by = 9;
  string updated_by = 10;
}

// Permission definition
message RolePermission {
  string id = 1;
  string name = 2;
  string description = 3;
  string resource = 4;
  string action = 5;
  repeated string scopes = 6;
  bool is_system_permission = 7;
  string category = 8;
}

// User role assignment
message UserRoleAssignment {
  string user_id = 1;
  string role_id = 2;
  string assigned_by = 3;
  google.protobuf.Timestamp assigned_at = 4;
  google.protobuf.Timestamp expires_at = 5;
  bool is_active = 6;
  string assignment_reason = 7;
}

// Request messages
message CreateRoleRequest {
  RequestMetadata metadata = 1;
  string name = 2;
  string description = 3;
  repeated string permission_ids = 4;
  bool is_active = 5;
}

message GetRoleRequest {
  RequestMetadata metadata = 1;
  string role_id = 2;
}

message UpdateRoleRequest {
  RequestMetadata metadata = 1;
  string role_id = 2;
  string name = 3;
  string description = 4;
  bool is_active = 5;
}

message DeleteRoleRequest {
  RequestMetadata metadata = 1;
  string role_id = 2;
  bool force_delete = 3; // Allow deletion of system roles
}

message ListRolesRequest {
  RequestMetadata metadata = 1;
  PaginationRequest pagination = 2;
  repeated SortRequest sort = 3;
  repeated FilterRequest filters = 4;
  bool include_system_roles = 5;
  bool include_inactive = 6;
  string search = 7;
}

message ListPermissionsRequest {
  RequestMetadata metadata = 1;
  PaginationRequest pagination = 2;
  repeated SortRequest sort = 3;
  repeated FilterRequest filters = 4;
  string category = 5;
  string resource = 6;
  bool include_system_permissions = 7;
}

message GetRolePermissionsRequest {
  RequestMetadata metadata = 1;
  string role_id = 2;
}

message AssignPermissionsToRoleRequest {
  RequestMetadata metadata = 1;
  string role_id = 2;
  repeated string permission_ids = 3;
  string reason = 4;
}

message RemovePermissionsFromRoleRequest {
  RequestMetadata metadata = 1;
  string role_id = 2;
  repeated string permission_ids = 3;
  string reason = 4;
}

message AssignRoleToUserRequest {
  RequestMetadata metadata = 1;
  string user_id = 2;
  string role_id = 3;
  google.protobuf.Timestamp expires_at = 4;
  string reason = 5;
}

message RemoveRoleFromUserRequest {
  RequestMetadata metadata = 1;
  string user_id = 2;
  string role_id = 3;
  string reason = 4;
}

message GetUserRolesRequest {
  RequestMetadata metadata = 1;
  string user_id = 2;
  bool include_expired = 3;
  bool include_inactive = 4;
}

message GetUsersWithRoleRequest {
  RequestMetadata metadata = 1;
  string role_id = 2;
  PaginationRequest pagination = 3;
  bool include_inactive = 4;
}

// Response messages
message CreateRoleResponse {
  Response response = 1;
  Role role = 2;
}

message GetRoleResponse {
  Response response = 1;
  Role role = 2;
  repeated RolePermission all_permissions = 3; // All available permissions for reference
}

message UpdateRoleResponse {
  Response response = 1;
  Role role = 2;
}

message DeleteRoleResponse {
  Response response = 1;
}

message ListRolesResponse {
  Response response = 1;
  repeated Role roles = 2;
  PaginationResponse pagination = 3;
}

message ListPermissionsResponse {
  Response response = 1;
  repeated RolePermission permissions = 2;
  PaginationResponse pagination = 3;
}

message GetRolePermissionsResponse {
  Response response = 1;
  Role role = 2;
  repeated RolePermission permissions = 3;
  repeated RolePermission available_permissions = 4; // Permissions that can be assigned
}

message AssignPermissionsToRoleResponse {
  Response response = 1;
  Role role = 2;
  repeated RolePermission assigned_permissions = 3;
}

message RemovePermissionsFromRoleResponse {
  Response response = 1;
  Role role = 2;
  repeated RolePermission remaining_permissions = 3;
}

message AssignRoleToUserResponse {
  Response response = 1;
  UserRoleAssignment assignment = 2;
  Role role = 3;
}

message RemoveRoleFromUserResponse {
  Response response = 1;
}

message GetUserRolesResponse {
  Response response = 1;
  repeated UserRoleAssignment assignments = 2;
  repeated Role roles = 3;
}

message GetUsersWithRoleResponse {
  Response response = 1;
  repeated User users = 2;
  PaginationResponse pagination = 3;
  repeated UserRoleAssignment assignments = 4;
}