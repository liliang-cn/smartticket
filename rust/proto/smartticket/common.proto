syntax = "proto3";

package smartticket.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/smartticket/proto/smartticket/v1;smartticketv1";

// Common enums and types used across services

enum TicketStatus {
  TICKET_STATUS_UNSPECIFIED = 0;
  TICKET_STATUS_NEW = 1;
  TICKET_STATUS_OPEN = 2;
  TICKET_STATUS_IN_PROGRESS = 3;
  TICKET_STATUS_PENDING_CUSTOMER = 4;
  TICKET_STATUS_PENDING_THIRD_PARTY = 5;
  TICKET_STATUS_RESOLVED = 6;
  TICKET_STATUS_CLOSED = 7;
  TICKET_STATUS_REOPENED = 8;
}

enum TicketPriority {
  TICKET_PRIORITY_UNSPECIFIED = 0;
  TICKET_PRIORITY_LOW = 1;
  TICKET_PRIORITY_NORMAL = 2;
  TICKET_PRIORITY_HIGH = 3;
  TICKET_PRIORITY_CRITICAL = 4;
}

enum TicketSeverity {
  TICKET_SEVERITY_UNSPECIFIED = 0;
  TICKET_SEVERITY_LOW = 1;
  TICKET_SEVERITY_MEDIUM = 2;
  TICKET_SEVERITY_HIGH = 3;
  TICKET_SEVERITY_CRITICAL = 4;
}

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_SUPER_ADMIN = 1;
  USER_ROLE_TENANT_ADMIN = 2;
  USER_ROLE_SUPPORT_ENGINEER = 3;
  USER_ROLE_CUSTOMER_USER = 4;
  USER_ROLE_SALES = 5;
}

enum SubscriptionTier {
  SUBSCRIPTION_TIER_UNSPECIFIED = 0;
  SUBSCRIPTION_TIER_STANDARD = 1;
  SUBSCRIPTION_TIER_PREMIUM = 2;
  SUBSCRIPTION_TIER_ENTERPRISE = 3;
}

enum KnowledgeStatus {
  KNOWLEDGE_STATUS_UNSPECIFIED = 0;
  KNOWLEDGE_STATUS_DRAFT = 1;
  KNOWLEDGE_STATUS_REVIEW = 2;
  KNOWLEDGE_STATUS_PUBLISHED = 3;
  KNOWLEDGE_STATUS_ARCHIVED = 4;
}

enum KnowledgeVisibility {
  KNOWLEDGE_VISIBILITY_UNSPECIFIED = 0;
  KNOWLEDGE_VISIBILITY_PUBLIC = 1;
  KNOWLEDGE_VISIBILITY_INTERNAL = 2;
  KNOWLEDGE_VISIBILITY_RESTRICTED = 3;
}

// Common response wrapper
message Response {
  bool success = 1;
  string message = 2;
  google.protobuf.Struct data = 3;
  repeated Error errors = 4;
  string request_id = 5;
}

message Error {
  string code = 1;
  string message = 2;
  google.protobuf.Struct details = 3;
}

// Pagination
message PaginationRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message PaginationResponse {
  int32 total_count = 1;
  int32 page_size = 2;
  string next_page_token = 3;
  string prev_page_token = 4;
}

// Sorting
message SortRequest {
  string field = 1;
  SortDirection direction = 2;
}

enum SortDirection {
  SORT_DIRECTION_UNSPECIFIED = 0;
  SORT_DIRECTION_ASC = 1;
  SORT_DIRECTION_DESC = 2;
}

// Filtering
message FilterRequest {
  string field = 1;
  FilterOperator operator = 2;
  repeated string values = 3;
}

enum FilterOperator {
  FILTER_OPERATOR_UNSPECIFIED = 0;
  FILTER_OPERATOR_EQUALS = 1;
  FILTER_OPERATOR_NOT_EQUALS = 2;
  FILTER_OPERATOR_IN = 3;
  FILTER_OPERATOR_NOT_IN = 4;
  FILTER_OPERATOR_GREATER_THAN = 5;
  FILTER_OPERATOR_GREATER_THAN_OR_EQUAL = 6;
  FILTER_OPERATOR_LESS_THAN = 7;
  FILTER_OPERATOR_LESS_THAN_OR_EQUAL = 8;
  FILTER_OPERATOR_CONTAINS = 9;
  FILTER_OPERATOR_STARTS_WITH = 10;
  FILTER_OPERATOR_ENDS_WITH = 11;
}

// Tenant context
message TenantContext {
  string tenant_id = 1;
  string user_id = 2;
  string user_role = 3;
}

// Common metadata that will be included in all requests
message RequestMetadata {
  string tenant_id = 1;
  string user_id = 2;
  string request_id = 3;
  string client_ip_address = 4;
  string user_agent = 5;
}