syntax = "proto3";

package smartticket.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "smartticket/common.proto";
import "smartticket/ticket.proto";

option go_package = "github.com/smartticket/proto/smartticket/v1;smartticketv1";

// Knowledge service definition
service KnowledgeService {
  // Create a new knowledge article
  rpc CreateArticle(CreateArticleRequest) returns (CreateArticleResponse);

  // Get an article by ID
  rpc GetArticle(GetArticleRequest) returns (GetArticleResponse);

  // Update an article
  rpc UpdateArticle(UpdateArticleRequest) returns (UpdateArticleResponse);

  // List articles with filtering and pagination
  rpc ListArticles(ListArticlesRequest) returns (ListArticlesResponse);

  // Delete an article (soft delete)
  rpc DeleteArticle(DeleteArticleRequest) returns (DeleteArticleResponse);

  // Publish an article
  rpc PublishArticle(PublishArticleRequest) returns (PublishArticleResponse);

  // Archive an article
  rpc ArchiveArticle(ArchiveArticleRequest) returns (ArchiveArticleResponse);

  // Search knowledge articles
  rpc SearchArticles(SearchArticlesRequest) returns (SearchArticlesResponse);

  // Get article suggestions for a ticket
  rpc GetArticleSuggestions(GetArticleSuggestionsRequest) returns (GetArticleSuggestionsResponse);

  // Rate article helpfulness
  rpc RateArticle(RateArticleRequest) returns (RateArticleResponse);

  // Get article categories
  rpc GetCategories(GetCategoriesRequest) returns (GetCategoriesResponse);

  // Create article category
  rpc CreateCategory(CreateCategoryRequest) returns (CreateCategoryResponse);
}

// Knowledge article message
message KnowledgeArticle {
  string id = 1;
  string tenant_id = 2;
  string title = 3;
  string content = 4;
  string summary = 5;
  string category_id = 6;
  string author_id = 7;
  KnowledgeStatus status = 8;
  KnowledgeVisibility visibility = 9;
  string language = 10;
  repeated string tags = 11;
  int32 view_count = 12;
  int32 helpful_count = 13;
  int32 not_helpful_count = 14;
  int32 version = 15;
  google.protobuf.Timestamp published_at = 16;
  google.protobuf.Timestamp expires_at = 17;
  google.protobuf.Timestamp created_at = 18;
  google.protobuf.Timestamp updated_at = 19;
  User author = 20;
  KnowledgeCategory category = 21;
}

// Knowledge category
message KnowledgeCategory {
  string id = 1;
  string tenant_id = 2;
  string name = 3;
  string description = 4;
  string parent_id = 5;
  string icon = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  repeated KnowledgeCategory children = 9;
}

// Article rating
message ArticleRating {
  string id = 1;
  string article_id = 2;
  string user_id = 3;
  bool is_helpful = 4;
  string comment = 5;
  google.protobuf.Timestamp created_at = 6;
}

// Request messages
message CreateArticleRequest {
  RequestMetadata metadata = 1;
  string title = 2;
  string content = 3;
  string summary = 4;
  string category_id = 5;
  KnowledgeVisibility visibility = 6;
  string language = 7;
  repeated string tags = 8;
  google.protobuf.Timestamp expires_at = 9;
}

message GetArticleRequest {
  RequestMetadata metadata = 1;
  string article_id = 2;
  bool increment_view_count = 3;
}

message UpdateArticleRequest {
  RequestMetadata metadata = 1;
  string article_id = 2;
  string title = 3;
  string content = 4;
  string summary = 5;
  string category_id = 6;
  KnowledgeVisibility visibility = 7;
  string language = 8;
  repeated string tags = 9;
  google.protobuf.Timestamp expires_at = 10;
  string comment = 11; // Reason for change
}

message ListArticlesRequest {
  RequestMetadata metadata = 1;
  PaginationRequest pagination = 2;
  repeated SortRequest sort = 3;
  repeated FilterRequest filters = 4;
  repeated KnowledgeStatus statuses = 5;
  repeated KnowledgeVisibility visibilities = 6;
  string category_id = 7;
  string author_id = 8;
  string language = 9;
  repeated string tags = 10;
  google.protobuf.Timestamp published_after = 11;
  google.protobuf.Timestamp published_before = 12;
}

message DeleteArticleRequest {
  RequestMetadata metadata = 1;
  string article_id = 2;
}

message PublishArticleRequest {
  RequestMetadata metadata = 1;
  string article_id = 2;
  string comment = 3;
}

message ArchiveArticleRequest {
  RequestMetadata metadata = 1;
  string article_id = 2;
  string reason = 3;
}

message SearchArticlesRequest {
  RequestMetadata metadata = 1;
  string query = 2;
  PaginationRequest pagination = 3;
  repeated string tags = 4;
  string category_id = 5;
  string language = 6;
  bool only_published = 7;
}

message GetArticleSuggestionsRequest {
  RequestMetadata metadata = 1;
  string ticket_title = 2;
  string ticket_description = 3;
  repeated string ticket_tags = 4;
  string category_id = 5;
  int32 limit = 6;
}

message RateArticleRequest {
  RequestMetadata metadata = 1;
  string article_id = 2;
  bool is_helpful = 3;
  string comment = 4;
}

message GetCategoriesRequest {
  RequestMetadata metadata = 1;
  string parent_id = 2;
}

message CreateCategoryRequest {
  RequestMetadata metadata = 1;
  string name = 2;
  string description = 3;
  string parent_id = 4;
  string icon = 5;
}

// Response messages
message CreateArticleResponse {
  Response response = 1;
  KnowledgeArticle article = 2;
}

message GetArticleResponse {
  Response response = 1;
  KnowledgeArticle article = 2;
  repeated KnowledgeArticle related_articles = 3;
}

message UpdateArticleResponse {
  Response response = 1;
  KnowledgeArticle article = 2;
}

message ListArticlesResponse {
  Response response = 1;
  repeated KnowledgeArticle articles = 2;
  PaginationResponse pagination = 3;
}

message DeleteArticleResponse {
  Response response = 1;
}

message PublishArticleResponse {
  Response response = 1;
  KnowledgeArticle article = 2;
}

message ArchiveArticleResponse {
  Response response = 1;
  KnowledgeArticle article = 2;
}

message SearchArticlesResponse {
  Response response = 1;
  repeated KnowledgeArticle articles = 2;
  PaginationResponse pagination = 3;
  int32 total_matches = 4;
}

message GetArticleSuggestionsResponse {
  Response response = 1;
  repeated KnowledgeArticle suggestions = 2;
}

message RateArticleResponse {
  Response response = 1;
  int32 helpful_count = 2;
  int32 not_helpful_count = 3;
}

message GetCategoriesResponse {
  Response response = 1;
  repeated KnowledgeCategory categories = 2;
}

message CreateCategoryResponse {
  Response response = 1;
  KnowledgeCategory category = 2;
}