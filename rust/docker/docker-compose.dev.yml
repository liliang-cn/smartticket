version: '3.8'

services:
  postgres-dev:
    image: m.daocloud.io/docker.io/library/postgres:15-alpine
    container_name: smartticket-postgres-dev
    environment:
      POSTGRES_DB: smartticket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./init-dev-db.sql:/docker-entrypoint-initdb.d/init-dev-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartticket"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-dev:
    image: m.daocloud.io/docker.io/library/redis:7-alpine
    container_name: smartticket-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_dev_data:
  redis_dev_data: