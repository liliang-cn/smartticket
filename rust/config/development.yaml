environment: development
service_name: smartticket
version: "0.1.0"
log_level: info
data_dir: ./data

database:
  host: "localhost"
  port: 5434
  database_name: "smartticket"
  username: "postgres"
  password: "postgres"
  ssl_mode: "prefer"
  max_connections: 20
  min_connections: 5
  connect_timeout: 30
  idle_timeout: 600

redis:
  host: "localhost"
  port: 6379
  database: 0
  username: null
  password: null
  max_connections: 10

server:
  grpc_port: 6533
  http_port: 7218
  host: "0.0.0.0"

auth:
  jwt_secret: "your-secret-key-here-for-testing-only"
  jwt_expiration: 3600
  refresh_expiration: 86400
  issuer: "smartticket"
  audience: "smartticket-client"
  bcrypt_cost: 4
  password_min_length: 6
  password_require_special: false
  password_require_numbers: false
  password_require_uppercase: false
  rate_limit:
    requests_per_minute: 60
    burst_size: 10

telemetry:
  enable_tracing: false
  enable_metrics: false
  jaeger_endpoint: "http://localhost:14268/api/traces"
  prometheus_port: 9090
