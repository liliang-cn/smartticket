# Air configuration for hot reload in development
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # Command to build the application
  cmd = "go build -o ./tmp/smartticket cmd/server/main.go"
  # Binary file path
  bin = "tmp/smartticket"
  # Include file extensions
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml"]
  # Exclude file extensions
  exclude_ext = ["_test.go"]
  # Include directories
  include_dir = []
  # Exclude directories
  exclude_dir = ["vendor", "testdata", ".git", "node_modules", "build", "dist"]
  # Include files
  include_file = []
  # Exclude files
  exclude_file = []
  # Exclude regex
  exclude_regex = ["_test\\.go"]
  # Follow symlink
  follow_symlink = true
  # Polling interval
  poll = false
  # Poll interval in milliseconds
  poll_interval = 500
  # Delay before restart
  delay = 1000
  # Stop on error
  stop_on_root = false
  # Send interrupt signal before kill
  send_interrupt = false
  # Kill delay
  kill_delay = "0s"

[log]
  # Show main process log
  main_only = false
  # Time format
  time = true

[color]
  # Customize colors
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # Delete tmp directory on exit
  clean_on_exit = false

[screen]
  clear_on_rebuild = true
  keep_scroll = true