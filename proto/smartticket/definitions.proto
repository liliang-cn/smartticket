syntax = "proto3";

package smartticket.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/smartticket/proto/smartticket/v1;smartticketv1";

// Common enums and types
enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_SUPER_ADMIN = 1;
  USER_ROLE_TENANT_ADMIN = 2;
  USER_ROLE_SUPPORT_ENGINEER = 3;
  USER_ROLE_CUSTOMER_USER = 4;
  USER_ROLE_SALES = 5;
}

enum SubscriptionTier {
  SUBSCRIPTION_TIER_UNSPECIFIED = 0;
  SUBSCRIPTION_TIER_STANDARD = 1;
  SUBSCRIPTION_TIER_PREMIUM = 2;
  SUBSCRIPTION_TIER_ENTERPRISE = 3;
}

// Common response wrapper
message Response {
  bool success = 1;
  string message = 2;
  google.protobuf.Struct data = 3;
  repeated Error errors = 4;
  string request_id = 5;
}

message Error {
  string code = 1;
  string message = 2;
  google.protobuf.Struct details = 3;
}

// Pagination
message PaginationRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message PaginationResponse {
  int32 total_count = 1;
  int32 page_size = 2;
  string next_page_token = 3;
  string prev_page_token = 4;
}

// Request metadata
message RequestMetadata {
  string tenant_id = 1;
  string user_id = 2;
  string request_id = 3;
  string client_ip_address = 4;
  string user_agent = 5;
}

// API Service definition
service APIService {
  // User Authentication
  // [HTTP] POST /v1/auth/login
  rpc Login(LoginRequest) returns (LoginResponse) {
  }

  // [HTTP] POST /v1/auth/refresh
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse) {
  }

  // Tenant Management
  // [HTTP] POST /v1/tenants
  rpc CreateTenant(CreateTenantRequest) returns (CreateTenantResponse) {
  }

  // [HTTP] GET /v1/tenants/{tenant_id}
  rpc GetTenant(GetTenantRequest) returns (GetTenantResponse) {
  }

  // [HTTP] GET /v1/tenants
  rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse) {
  }

  // User Management
  // [HTTP] POST /v1/users
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {
  }

  // [HTTP] GET /v1/users/{user_id}
  rpc GetUser(GetUserRequest) returns (GetUserResponse) {
  }

  // [HTTP] GET /v1/users
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
  }
}

// User messages
message User {
  string id = 1;
  string tenant_id = 2;
  string email = 3;
  string username = 4;
  string full_name = 5;
  UserRole role = 6;
  bool is_active = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message LoginRequest {
  string email = 1;
  string password = 2;
  string tenant_domain = 3;
  bool remember_me = 4;
}

message LoginResponse {
  Response response = 1;
  string access_token = 2;
  string refresh_token = 3;
  User user = 4;
  google.protobuf.Timestamp expires_at = 5;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  Response response = 1;
  string access_token = 2;
  string refresh_token = 3;
  google.protobuf.Timestamp expires_at = 4;
}

// Tenant messages
message Tenant {
  string id = 1;
  string name = 2;
  string domain = 3;
  SubscriptionTier subscription_tier = 4;
  int32 max_users = 5;
  string data_residency_region = 6;
  bool is_active = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message CreateTenantRequest {
  RequestMetadata metadata = 1;
  string name = 2;
  string domain = 3;
  SubscriptionTier subscription_tier = 4;
  int32 max_users = 5;
  string data_residency_region = 6;
  string contact_email = 7;
}

message GetTenantRequest {
  RequestMetadata metadata = 1;
  string tenant_id = 2;
}

message ListTenantsRequest {
  RequestMetadata metadata = 1;
  PaginationRequest pagination = 2;
  string search = 3;
}

message CreateTenantResponse {
  Response response = 1;
  Tenant tenant = 2;
}

message GetTenantResponse {
  Response response = 1;
  Tenant tenant = 2;
}

message ListTenantsResponse {
  Response response = 1;
  repeated Tenant tenants = 2;
  PaginationResponse pagination = 3;
}

// User request/response messages
message CreateUserRequest {
  RequestMetadata metadata = 1;
  string email = 2;
  string username = 3;
  string full_name = 4;
  string password = 5;
  UserRole role = 6;
}

message GetUserRequest {
  RequestMetadata metadata = 1;
  string user_id = 2;
}

message ListUsersRequest {
  RequestMetadata metadata = 1;
  PaginationRequest pagination = 2;
  string search = 3;
}

message CreateUserResponse {
  Response response = 1;
  User user = 2;
}

message GetUserResponse {
  Response response = 1;
  User user = 2;
}

message ListUsersResponse {
  Response response = 1;
  repeated User users = 2;
  PaginationResponse pagination = 3;
}