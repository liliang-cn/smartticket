syntax = "proto3";

package smartticket.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "smartticket/common.proto";
import "smartticket/ticket.proto";

option go_package = "github.com/smartticket/proto/smartticket/v1;smartticketv1";

// SLA service definition
service SlaService {
  // Create a new SLA policy
  rpc CreateSlaPolicy(CreateSlaPolicyRequest) returns (CreateSlaPolicyResponse) {
  }

  // Get an SLA policy by ID
  rpc GetSlaPolicy(GetSlaPolicyRequest) returns (GetSlaPolicyResponse) {
  }

  // Update an SLA policy
  rpc UpdateSlaPolicy(UpdateSlaPolicyRequest) returns (UpdateSlaPolicyResponse) {
  }

  // List SLA policies
  rpc ListSlaPolicies(ListSlaPoliciesRequest) returns (ListSlaPoliciesResponse) {
  }

  // Delete an SLA policy
  rpc DeleteSlaPolicy(DeleteSlaPolicyRequest) returns (DeleteSlaPolicyResponse) {
  }

  // Get SLA metrics for a ticket
  rpc GetSlaMetrics(GetSlaMetricsRequest) returns (GetSlaMetricsResponse) {
  }

  // Get SLA dashboard data
  rpc GetSlaDashboard(GetSlaDashboardRequest) returns (GetSlaDashboardResponse) {
  }

  // Get SLA breach alerts
  rpc GetSlaBreaches(GetSlaBreachesRequest) returns (GetSlaBreachesResponse) {
  }

  // Update SLA metrics (internal service)
  rpc UpdateSlaMetrics(UpdateSlaMetricsRequest) returns (UpdateSlaMetricsResponse);
}

// SLA policy message
message SlaPolicy {
  string id = 1;
  string tenant_id = 2;
  string name = 3;
  string description = 4;
  TicketPriority priority = 5;
  TicketSeverity severity = 6;
  int32 response_time_minutes = 7;
  int32 resolution_time_minutes = 8;
  bool business_hours_only = 9;
  string timezone = 10;
  bool is_active = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

// SLA metrics message
message SlaMetrics {
  string id = 1;
  string tenant_id = 2;
  string ticket_id = 3;
  string sla_policy_id = 4;
  google.protobuf.Timestamp response_due_at = 5;
  google.protobuf.Timestamp resolution_due_at = 6;
  google.protobuf.Timestamp first_response_at = 7;
  google.protobuf.Timestamp resolved_at = 8;
  bool response_breached = 9;
  bool resolution_breached = 10;
  int32 response_time_minutes = 11;
  int32 resolution_time_minutes = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
  SlaPolicy sla_policy = 15;
  Ticket ticket = 16;
}

// SLA dashboard data
message SlaDashboard {
  repeated SlaDashboardItem compliance = 1;
  repeated SlaDashboardItem breaches = 2;
  SlaSummary summary = 3;
  repeated SlaTrend trend = 4;
}

message SlaDashboardItem {
  string category = 1;
  int32 total = 2;
  int32 achieved = 3;
  double percentage = 4;
}

message SlaSummary {
  int32 total_tickets = 1;
  int32 response_breaches = 2;
  int32 resolution_breaches = 3;
  double response_compliance_rate = 4;
  double resolution_compliance_rate = 5;
  int32 overdue_tickets = 6;
}

message SlaTrend {
  string period = 1;
  double response_compliance = 2;
  double resolution_compliance = 3;
  int32 total_tickets = 4;
}

// SLA breach alert
message SlaBreachAlert {
  string id = 1;
  string tenant_id = 2;
  string ticket_id = 3;
  string sla_policy_id = 4;
  string breach_type = 5;
  google.protobuf.Timestamp due_at = 6;
  google.protobuf.Timestamp breach_time = 7;
  bool is_overdue = 8;
  int32 minutes_overdue = 9;
  google.protobuf.Timestamp created_at = 10;
  Ticket ticket = 11;
  SlaPolicy sla_policy = 12;
}

// Request messages
message CreateSlaPolicyRequest {
  RequestMetadata metadata = 1;
  string name = 2;
  string description = 3;
  TicketPriority priority = 4;
  TicketSeverity severity = 5;
  int32 response_time_minutes = 6;
  int32 resolution_time_minutes = 7;
  bool business_hours_only = 8;
  string timezone = 9;
}

message GetSlaPolicyRequest {
  RequestMetadata metadata = 1;
  string policy_id = 2;
}

message UpdateSlaPolicyRequest {
  RequestMetadata metadata = 1;
  string policy_id = 2;
  string name = 3;
  string description = 4;
  int32 response_time_minutes = 5;
  int32 resolution_time_minutes = 6;
  bool business_hours_only = 7;
  string timezone = 8;
  bool is_active = 9;
}

message ListSlaPoliciesRequest {
  RequestMetadata metadata = 1;
  PaginationRequest pagination = 2;
  repeated SortRequest sort = 3;
  bool is_active = 4;
  repeated TicketPriority priorities = 5;
  repeated TicketSeverity severities = 6;
}

message DeleteSlaPolicyRequest {
  RequestMetadata metadata = 1;
  string policy_id = 2;
}

message GetSlaMetricsRequest {
  RequestMetadata metadata = 1;
  string ticket_id = 2;
}

message GetSlaDashboardRequest {
  RequestMetadata metadata = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
  string group_by = 4; // day, week, month
}

message GetSlaBreachesRequest {
  RequestMetadata metadata = 1;
  PaginationRequest pagination = 2;
  string breach_type = 3; // response, resolution
  bool only_overdue = 4;
  google.protobuf.Timestamp start_date = 5;
  google.protobuf.Timestamp end_date = 6;
}

message UpdateSlaMetricsRequest {
  RequestMetadata metadata = 1;
  string ticket_id = 2;
  string event_type = 3; // first_response, resolved
  google.protobuf.Timestamp event_time = 4;
}

// Response messages
message CreateSlaPolicyResponse {
  Response response = 1;
  SlaPolicy policy = 2;
}

message GetSlaPolicyResponse {
  Response response = 1;
  SlaPolicy policy = 2;
}

message UpdateSlaPolicyResponse {
  Response response = 1;
  SlaPolicy policy = 2;
}

message ListSlaPoliciesResponse {
  Response response = 1;
  repeated SlaPolicy policies = 2;
  PaginationResponse pagination = 3;
}

message DeleteSlaPolicyResponse {
  Response response = 1;
}

message GetSlaMetricsResponse {
  Response response = 1;
  SlaMetrics metrics = 2;
}

message GetSlaDashboardResponse {
  Response response = 1;
  SlaDashboard dashboard = 2;
}

message GetSlaBreachesResponse {
  Response response = 1;
  repeated SlaBreachAlert breaches = 2;
  PaginationResponse pagination = 3;
}

message UpdateSlaMetricsResponse {
  Response response = 1;
  SlaMetrics metrics = 2;
}