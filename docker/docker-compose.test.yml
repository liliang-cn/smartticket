version: '3.8'

services:
  postgres-test:
    image: m.daocloud.io/docker.io/library/postgres:15-alpine
    container_name: smartticket-postgres-test
    environment:
      POSTGRES_DB: smartticket_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"  # Different port for tests
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartticket_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    image: m.daocloud.io/docker.io/library/redis:7-alpine
    container_name: smartticket-redis-test
    ports:
      - "6381:6379"  # Different port for tests
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_test_data:
  redis_test_data: