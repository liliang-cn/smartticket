openapi: 3.0.3
info:
  title: SmartTicket API - Complete Real
  description: Complete API documentation for SmartTicket multi-tenant ticketing and knowledge collaboration platform - All Available Endpoints
  version: 1.0.0
  contact:
    name: SmartTicket Team
    email: support@smartticket.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:6533
    description: Development server

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Bearer token for authentication. Format: "Bearer {token}"'

  parameters:
    TenantID:
      name: X-Tenant-ID
      in: header
      required: true
      description: Tenant identifier for multi-tenant isolation
      schema:
        type: string
        example: "1"

    Page:
      name: page
      in: query
      description: Page number for pagination
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSize:
      name: page_size
      in: query
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    ID:
      name: id
      in: path
      required: true
      description: Resource ID
      schema:
        type: string

    PermissionID:
      name: permissionId
      in: path
      required: true
      description: Permission ID
      schema:
        type: string

    RoleID:
      name: roleId
      in: path
      required: true
      description: Role ID
      schema:
        type: string

    Slug:
      name: slug
      in: path
      required: true
      description: Resource slug
      schema:
        type: string

  schemas:
    BaseResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Request success status
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    ResponseMeta:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: Response timestamp
        request_id:
          type: string
          description: Unique request identifier

    SuccessResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
      properties:
        data:
          type: object
          properties:
            message:
              type: string
              description: Success message

    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Error code
            message:
              type: string
              description: Error message
            details:
              type: object
              description: Additional error details

    User:
      type: object
      properties:
        id:
          type: integer
          description: User ID
        email:
          type: string
          format: email
          description: User email
        username:
          type: string
          description: Username
        first_name:
          type: string
          description: First name
        last_name:
          type: string
          description: Last name
        role:
          type: string
          description: User role
        is_active:
          type: boolean
          description: Whether user is active
        last_login_at:
          type: string
          format: date-time
          description: Last login timestamp
        tenant_id:
          type: integer
          description: Tenant ID
        tenant_name:
          type: string
          description: Tenant name

    Ticket:
      type: object
      properties:
        id:
          type: integer
          description: Ticket ID
        title:
          type: string
          description: Ticket title
        description:
          type: string
          description: Ticket description
        status:
          type: string
          enum: [open, in_progress, pending_customer, resolved, closed]
          description: Ticket status
        priority:
          type: string
          enum: [low, medium, high, critical]
          description: Ticket priority
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Update timestamp

    Permission:
      type: object
      properties:
        id:
          type: integer
          description: Permission ID
        code:
          type: string
          description: Permission code
        name:
          type: string
          description: Permission name
        description:
          type: string
          description: Permission description
        is_system:
          type: boolean
          description: Whether this is a system permission

    Role:
      type: object
      properties:
        id:
          type: integer
          description: Role ID
        name:
          type: string
          description: Role name
        description:
          type: string
          description: Role description
        is_system:
          type: boolean
          description: Whether this is a system role

    Product:
      type: object
      properties:
        id:
          type: integer
          description: Product ID
        name:
          type: string
          description: Product name
        description:
          type: string
          description: Product description
        is_active:
          type: boolean
          description: Whether product is active

    Service:
      type: object
      properties:
        id:
          type: integer
          description: Service ID
        name:
          type: string
          description: Service name
        description:
          type: string
          description: Service description
        is_active:
          type: boolean
          description: Whether service is active

    SLATemplate:
      type: object
      properties:
        id:
          type: integer
          description: SLA Template ID
        name:
          type: string
          description: SLA Template name
        description:
          type: string
          description: SLA Template description
        response_time:
          type: integer
          description: Response time in minutes
        resolution_time:
          type: integer
          description: Resolution time in hours

    SLARule:
      type: object
      properties:
        id:
          type: integer
          description: SLA Rule ID
        name:
          type: string
          description: SLA Rule name
        description:
          type: string
          description: SLA Rule description
        is_active:
          type: boolean
          description: Whether SLA rule is active

    Tenant:
      type: object
      properties:
        id:
          type: integer
          description: Tenant ID
        name:
          type: string
          description: Tenant name
        slug:
          type: string
          description: Tenant slug
        domain:
          type: string
          description: Tenant domain
        is_active:
          type: boolean
          description: Whether tenant is active
        plan:
          type: string
          description: Tenant plan
        max_users:
          type: integer
          description: Maximum users allowed

    KnowledgeArticle:
      type: object
      properties:
        id:
          type: integer
          description: Article ID
        title:
          type: string
          description: Article title
        content:
          type: string
          description: Article content
        status:
          type: string
          enum: [draft, review, published, archived]
          description: Article status
        visibility:
          type: string
          enum: [private, internal, public]
          description: Article visibility
        category:
          type: string
          description: Article category
        views:
          type: integer
          description: Number of views

    ImportExportJob:
      type: object
      properties:
        id:
          type: integer
          description: Job ID
        type:
          type: string
          enum: [import, export]
          description: Job type
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
          description: Job status
        progress:
          type: number
          description: Progress percentage
        created_at:
          type: string
          format: date-time
          description: Creation timestamp

paths:
  # Health Check Endpoints
  /health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: Returns the health status of the API
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /healthz:
    get:
      tags:
        - Health
      summary: Alternative health check endpoint
      description: Alternative health check endpoint
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/health:
    get:
      tags:
        - Health
      summary: API health check endpoint
      description: API health check endpoint
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /version:
    get:
      tags:
        - Health
      summary: Get version information
      description: Returns version and build information
      responses:
        '200':
          description: Version information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/version:
    get:
      tags:
        - Health
      summary: Get API version information
      description: Returns API version and build information
      responses:
        '200':
          description: Version information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # Application Info
  /api/v1/info:
    get:
      tags:
        - Health
      summary: Get application information
      description: Returns general application information
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: Application information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # Authentication Endpoints
  /api/v1/auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user and return JWT tokens
      parameters:
        - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: User email
                password:
                  type: string
                  format: password
                  description: User password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh JWT token
      description: Refresh access token using refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
                  description: Refresh token
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/auth/logout:
    post:
      tags:
        - Authentication
      summary: User logout
      description: Invalidate JWT token
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/auth/profile:
    get:
      tags:
        - Authentication
      summary: Get user profile
      description: Get the profile information of the currently authenticated user
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'

  /api/v1/auth/change-password:
    post:
      tags:
        - Authentication
      summary: Change password
      description: Change the password of the currently authenticated user
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - current_password
                - new_password
                - confirm_password
              properties:
                current_password:
                  type: string
                  format: password
                  description: Current password
                new_password:
                  type: string
                  format: password
                  minLength: 6
                  description: New password
                confirm_password:
                  type: string
                  format: password
                  description: Confirm new password
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user information
      description: Get basic information about the currently authenticated user
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: User information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/auth/validate:
    get:
      tags:
        - Authentication
      summary: Validate access token
      description: Validate if an access token is still valid
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # User Management Endpoints
  /api/v1/users:
    get:
      tags:
        - Users
      summary: List users
      description: Retrieve a paginated list of users
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

    post:
      tags:
        - Users
      summary: Create user
      description: Create a new user
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: User email
                password:
                  type: string
                  format: password
                  minLength: 6
                  description: User password
                username:
                  type: string
                  description: Username
                first_name:
                  type: string
                  description: First name
                last_name:
                  type: string
                  description: Last name
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/users/stats:
    get:
      tags:
        - Users
      summary: Get user statistics
      description: Get user-related statistics
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: User statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/users/{id}:
    get:
      tags:
        - Users
      summary: Get user
      description: Get a specific user by ID
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: User retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'

    put:
      tags:
        - Users
      summary: Update user
      description: Update a user's information
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  description: User email
                username:
                  type: string
                  description: Username
                first_name:
                  type: string
                  description: First name
                last_name:
                  type: string
                  description: Last name
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

    delete:
      tags:
        - Users
      summary: Delete user
      description: Delete a user
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/ID'
      responses:
        '204':
          description: User deleted successfully

  /api/v1/users/{id}/activate:
    post:
      tags:
        - Users
      summary: Activate user
      description: Activate a user account
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: User activated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/users/{id}/deactivate:
    post:
      tags:
        - Users
      summary: Deactivate user
      description: Deactivate a user account
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: User deactivated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # User Permissions
  /api/v1/users/{id}/permissions:
    get:
      tags:
        - Users
      summary: Get user permissions
      description: Get permissions assigned to a specific user
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: User permissions retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/users/{id}/permissions/assign:
    post:
      tags:
        - Users
      summary: Assign permission to user
      description: Assign a permission to a specific user
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - permission_id
              properties:
                permission_id:
                  type: integer
                  description: Permission ID to assign
      responses:
        '200':
          description: Permission assigned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/users/{id}/permissions/{permissionId}:
    delete:
      tags:
        - Users
      summary: Remove permission from user
      description: Remove a permission from a specific user
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/PermissionID'
      responses:
        '200':
          description: Permission removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # User Roles
  /api/v1/users/{id}/roles:
    get:
      tags:
        - Users
      summary: Get user roles
      description: Get roles assigned to a specific user
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: User roles retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/users/{id}/roles/assign:
    post:
      tags:
        - Users
      summary: Assign role to user
      description: Assign a role to a specific user
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role_id
              properties:
                role_id:
                  type: integer
                  description: Role ID to assign
      responses:
        '200':
          description: Role assigned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/users/{id}/roles/{roleId}:
    delete:
      tags:
        - Users
      summary: Remove role from user
      description: Remove a role from a specific user
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/ID'
        - $ref: '#/components/parameters/RoleID'
      responses:
        '200':
          description: Role removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # Permission Management
  /api/v1/permissions:
    get:
      tags:
        - Permissions
      summary: List permissions
      description: Get a list of all available permissions
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Permissions retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

    post:
      tags:
        - Permissions
      summary: Create permission
      description: Create a new permission
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
                - name
              properties:
                code:
                  type: string
                  description: Permission code
                name:
                  type: string
                  description: Permission name
                description:
                  type: string
                  description: Permission description
      responses:
        '201':
          description: Permission created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/v1/permissions/{id}:
    get:
      tags:
        - Permissions
      summary: Get permission
      description: Get a specific permission by ID
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Permission retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Permission'

    put:
      tags:
        - Permissions
      summary: Update permission
      description: Update a permission
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: Permission code
                name:
                  type: string
                  description: Permission name
                description:
                  type: string
                  description: Permission description
      responses:
        '200':
          description: Permission updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

    delete:
      tags:
        - Permissions
      summary: Delete permission
      description: Delete a permission
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Permission deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # Role Management
  /api/v1/roles:
    get:
      tags:
        - Roles
      summary: List roles
      description: Get a list of all available roles
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Roles retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

    post:
      tags:
        - Roles
      summary: Create role
      description: Create a new role
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Role name
                description:
                  type: string
                  description: Role description
      responses:
        '201':
          description: Role created successfully
          content:
